name: Build package and publish to PyPI if is a tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Set up Fortran (Linux/macOS)
        if: runner.os != 'Windows'
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc

      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: mingw-w64-x86_64-gcc-fortran mingw-w64-x86_64-cmake
          path-type: inherit

      - name: Set up CMake (Linux)
        if: runner.os == 'Linux'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Set up CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Set up CMake (Windows)
        if: runner.os == 'Windows'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Install build tooling (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user build wheel

      - name: Install build tooling (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user build wheel

      - name: Build a binary wheel and a source tarball (Linux/macOS)
        if: runner.os != 'Windows'
        run: python3 -m build

      - name: Build a binary wheel and a source tarball (Windows)
        if: runner.os == 'Windows'
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions-${{ matrix.os }}
          path: dist/

  publish-to-pypi:
    name: Publish Python distribution to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/miescat/
    permissions:
      id-token: write

    steps:
      - name: Download Ubuntu dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-ubuntu-latest
          path: dist/

      - name: Download macOS dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-macos-latest
          path: dist/

      - name: Download Windows dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-windows-latest
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
